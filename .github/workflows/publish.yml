name: Publish to Roblox

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
      - name: Run selene
        run: selene src --allow-warnings
        continue-on-error: true
      - name: Check formatting
        run: stylua --check src
        continue-on-error: true
      - name: Run tests
        run: lune run tests/runner
        continue-on-error: true

  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install Wally packages
        run: wally install

      - name: Build place file
        run: rojo build default.project.json -o Origami-Playground.rbxl

      - name: Install rbxcloud CLI
        run: |
          LATEST=$(curl -sI https://github.com/Sleitnick/rbxcloud/releases/latest | grep -i location | sed 's|.*/v||;s/\r//')
          curl -L "https://github.com/Sleitnick/rbxcloud/releases/download/v${LATEST}/rbxcloud-${LATEST}-linux.zip" -o rbxcloud.zip
          unzip rbxcloud.zip
          chmod +x rbxcloud
          sudo mv rbxcloud /usr/local/bin/

      - name: Publish to Roblox
        run: |
          for i in 1 2 3; do
            rbxcloud experience publish \
              --api-key "$ROBLOX_API_KEY" \
              --universe-id "$ROBLOX_UNIVERSE_ID" \
              --place-id "$ROBLOX_PLACE_ID" \
              --version-type published \
              --filename Origami-Playground.rbxl && exit 0
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          exit 1
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_UNIVERSE_ID: ${{ secrets.ROBLOX_UNIVERSE_ID }}
          ROBLOX_PLACE_ID: ${{ secrets.ROBLOX_PLACE_ID }}
